- hosts: all
  become: true

  vars:
    pip_install_packages:
      - name: docker

    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

    docker_install_compose_plugin: true

  pre_tasks:
    - name: Install python3-debian
      apt:
        name: python3-debian
        state: present
        update_cache: true
      ignore_errors: true

  roles:
    - geerlingguy.pip
    - geerlingguy.docker
